<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>Display Antrian</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root{ --bg:#0a0a0a; --card:rgba(255,255,255,0.05); --text:#fff; --muted:#a8a8a8; }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:Arial,Segoe UI;background:var(--bg);color:var(--text)}
    .wrap{max-width:1600px;margin:0 auto;padding:24px}
    .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
    .title{font-size:20px;font-weight:700}
    .clock{color:var(--muted)}
    .slots{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
    .slot{background:var(--card);border-radius:12px;padding:20px;text-align:center;min-height:160px}
    .slot h1{font-size:72px;margin:8px 0}
    .slot span{color:var(--muted)}
    @media(max-width:900px){ .slots{grid-template-columns:1fr} .slot h1{font-size:48px} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div class="left">
        <div class="title" id="title">Direktorat Metrologi</div>
      </div>
      <div id="clock" class="clock"></div>
    </div>

    <main>
      <div id="slots" class="slots">
        <div class="slot"><span>Belum ada panggilan</span></div>
        <div class="slot"><span>Belum ada panggilan</span></div>
        <div class="slot"><span>Belum ada panggilan</span></div>
        <div class="slot"><span>Belum ada panggilan</span></div>
      </div>
      <div style="color:var(--muted);margin-top:12px">Tampilan menampilkan 4 panggilan terbaru. Ketika tombol Panggil ditekan, nomor akan muncul di paling atas.</div>
    </main>
  </div>

  <script src="display.js"></script>
</body>
</html>
